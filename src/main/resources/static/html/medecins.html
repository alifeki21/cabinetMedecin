<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabinet Médical - Médecins</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="index.html"><i class="bi bi-hospital"></i> CabinetMed</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="medecins.html">Médecins</a></li>
                <li class="nav-item"><a class="nav-link" href="patients.html">Patients</a></li>
                <li class="nav-item"><a class="nav-link" href="rendezvous.html">Rendez-vous</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-person-badge"></i> Liste des Médecins</h2>
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addMedecinModal">
            <i class="bi bi-plus-circle"></i> Ajouter un Médecin
        </button>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-light">
                <tr>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Spécialité</th>
                    <th>Téléphone</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="medecinList">
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="addMedecinModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Nouveau Médecin</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="medecinForm">
                    <div class="mb-3">
                        <label class="form-label">Nom</label>
                        <input type="text" id="nom" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Prénom</label>
                        <input type="text" id="prenom" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Spécialité</label>
                        <input type="text" id="specialite" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Téléphone</label>
                        <input type="text" id="telephone" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Enregistrer</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const API_URL = "http://localhost:8080/api/medecins";

    // Charger les médecins au chargement de la page
    document.addEventListener('DOMContentLoaded', loadMedecins);

    async function loadMedecins() {
        try {
            const response = await fetch(API_URL);
            const medecins = await response.json();
            const list = document.getElementById('medecinList');
            list.innerHTML = medecins.map(m => `
                <tr>
                    <td>${m.nom}</td>
                    <td>${m.prenom}</td>
                    <td><span class="badge bg-info text-dark">${m.specialite}</span></td>
                    <td>${m.telephone}</td>
                    <td>
                        <button class="btn btn-sm btn-danger" onclick="deleteMedecin(${m.id})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        } catch (error) {
            console.error("Erreur:", error);
        }
    }

    // Ajouter un médecin
    document.getElementById('medecinForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const newMedecin = {
            nom: document.getElementById('nom').value,
            prenom: document.getElementById('prenom').value,
            specialite: document.getElementById('specialite').value,
            telephone: document.getElementById('telephone').value
        };

        await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(newMedecin)
        });

        location.reload(); // Recharger la liste
    });

    async function deleteMedecin(id) {
        if(confirm("Supprimer ce médecin ?")) {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            loadMedecins();
        }
    }
</script>
</body>
</html>
