<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Cabinet Med - Patients</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="index.html">CabinetMed</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="medecins.html">Médecins</a></li>
                <li class="nav-item"><a class="nav-link active" href="patients.html">Patients</a></li>
                <li class="nav-item"><a class="nav-link" href="rendezvous.html">Rendez-vous</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="d-flex justify-content-between mb-4">
        <h2><i class="bi bi-people"></i> Registre des Patients</h2>
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#patientModal">Ajouter Patient</button>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <table class="table">
                <thead>
                <tr>
                    <th>Nom & Prénom</th>
                    <th>Naissance</th>
                    <th>Email</th>
                    <th>Téléphone</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="patientList"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="patientModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="patientForm">
                <div class="modal-header"><h5>Nouveau Patient</h5></div>
                <div class="modal-body">
                    <input type="text" id="pNom" class="form-control mb-2" placeholder="Nom" required>
                    <input type="text" id="pPrenom" class="form-control mb-2" placeholder="Prénom" required>
                    <input type="date" id="pDate" class="form-control mb-2" required>
                    <input type="email" id="pEmail" class="form-control mb-2" placeholder="Email" required>
                    <input type="text" id="pTel" class="form-control mb-2" placeholder="Téléphone" required>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary w-100">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const API_PATIENTS = "http://localhost:8080/api/patients";

    async function loadPatients() {
        const res = await fetch(API_PATIENTS);
        const data = await res.json();
        document.getElementById('patientList').innerHTML = data.map(p => `
            <tr>
                <td>${p.nom} ${p.prenom}</td>
                <td>${p.dateNaissance}</td>
                <td>${p.email}</td>
                <td>${p.telephone}</td>
                <td><button class="btn btn-danger btn-sm" onclick="deletePatient(${p.id})"><i class="bi bi-trash"></i></button></td>
            </tr>
        `).join('');
    }

    document.getElementById('patientForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const patient = {
            nom: document.getElementById('pNom').value,
            prenom: document.getElementById('pPrenom').value,
            dateNaissance: document.getElementById('pDate').value,
            email: document.getElementById('pEmail').value,
            telephone: document.getElementById('pTel').value
        };
        await fetch(API_PATIENTS, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(patient)
        });
        location.reload();
    });

    async function deletePatient(id) {
        if(confirm("Supprimer ce patient ?")) {
            await fetch(`${API_PATIENTS}/${id}`, { method: 'DELETE' });
            loadPatients();
        }
    }
    loadPatients();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
