<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CabinetMed - Tableau de Bord</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .stat-card { transition: transform 0.3s; cursor: pointer; }
        .stat-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="index.html"><i class="bi bi-hospital"></i> CabinetMed</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="medecins.html">Médecins</a></li>
                <li class="nav-item"><a class="nav-link" href="patients.html">Patients</a></li>
                <li class="nav-item"><a class="nav-link" href="rendezvous.html">Rendez-vous</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row mb-4">
        <div class="col">
            <h1 class="display-5 fw-bold text-secondary">Bienvenue, Admin</h1>
            <p class="lead">Résumé de l'activité du cabinet.</p>
        </div>
    </div>

    <div class="row g-4 mb-5">
        <div class="col-md-4">
            <div class="card stat-card bg-white border-0 shadow-sm p-3" onclick="location.href='medecins.html'">
                <div class="d-flex align-items-center">
                    <div class="icon-box bg-primary text-white rounded p-3 me-3">
                        <i class="bi bi-person-badge fs-3"></i>
                    </div>
                    <div>
                        <h6 class="text-muted mb-0">Médecins</h6>
                        <h3 id="countMedecins" class="mb-0">...</h3>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card bg-white border-0 shadow-sm p-3" onclick="location.href='patients.html'">
                <div class="d-flex align-items-center">
                    <div class="icon-box bg-success text-white rounded p-3 me-3">
                        <i class="bi bi-people fs-3"></i>
                    </div>
                    <div>
                        <h6 class="text-muted mb-0">Patients</h6>
                        <h3 id="countPatients" class="mb-0">...</h3>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card bg-white border-0 shadow-sm p-3" onclick="location.href='rendezvous.html'">
                <div class="d-flex align-items-center">
                    <div class="icon-box bg-warning text-white rounded p-3 me-3">
                        <i class="bi bi-calendar-event fs-3"></i>
                    </div>
                    <div>
                        <h6 class="text-muted mb-0">Rendez-vous</h6>
                        <h3 id="countRDV" class="mb-0">...</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0"><i class="bi bi-clock-history me-2"></i>Rendez-vous Récents</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                            <tr>
                                <th>Date & Heure</th>
                                <th>Médecin</th>
                                <th>Patient</th>
                                <th>Statut</th>
                            </tr>
                            </thead>
                            <tbody id="recentRDV">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    async function fetchDashboardData() {
        try {
            // Appel de toutes les APIs en parallèle
            const [medRes, patRes, rdvRes] = await Promise.all([
                fetch('http://localhost:8080/api/medecins'),
                fetch('http://localhost:8080/api/patients'),
                fetch('http://localhost:8080/api/rendezvous')
            ]);

            const medecins = await medRes.json();
            const patients = await patRes.json();
            const rdvs = await rdvRes.json();

            // Mise à jour des compteurs
            document.getElementById('countMedecins').innerText = medecins.length;
            document.getElementById('countPatients').innerText = patients.length;
            document.getElementById('countRDV').innerText = rdvs.length;

            // Affichage des 5 derniers RDV
            const recentTable = document.getElementById('recentRDV');
            const lastFive = rdvs.reverse().slice(0, 5); // Les plus récents en premier

            recentTable.innerHTML = lastFive.map(r => `
                <tr>
                    <td class="fw-bold">${r.dateHeure}</td>
                    <td>Dr. ${r.medecin.nom}</td>
                    <td>${r.patient.nom} ${r.patient.prenom}</td>
                    <td>
                        <span class="badge ${r.statut === 'PLANIFIE' ? 'bg-info' : 'bg-secondary'}">
                            ${r.statut}
                        </span>
                    </td>
                </tr>
            `).join('');

        } catch (error) {
            console.error("Erreur de chargement des données:", error);
        }
    }

    // Charger les données au lancement
    window.onload = fetchDashboardData;
</script>
</body>
</html>
